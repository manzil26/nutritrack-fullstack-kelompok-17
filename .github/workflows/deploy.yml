name: NutriTrack CI/CD Pipeline - Kelompok 17

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  BACKEND_APP_NAME: 'nutritrack-backend-klp17'
  FRONTEND_APP_NAME: 'nutritrack-frontend-klp17'
  BACKEND_URL: 'https://nutritrack-backend-klp17-hncma4e5hwbqarbv.southeastasia-01.azurewebsites.net'
  FRONTEND_URL: 'https://nutritrack-frontend-klp17-dqfdh7hra0hsbxcb.southeastasia-01.azurewebsites.net'

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Run backend lint
        run: npm run lint --if-present

      - name: Run backend tests
        run: npm test --if-present

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-artifact
          path: |
            backend/**
            !backend/node_modules
            !backend/.env
          retention-days: 1

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-artifact
          path: frontend/dist
          retention-days: 1

  backend-cd:
    name: Backend CD - Deploy to Azure App Service
    runs-on: ubuntu-latest
    needs: backend-ci

    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-artifact
          path: backend

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install backend production dependencies
        working-directory: backend
        run: npm ci --omit=dev

      - name: Check backend publish profile secret
        env:
          AZURE_BACKEND_PUBLISH_PROFILE: ${{ secrets.AZURE_BACKEND_PUBLISH_PROFILE }}
        run: |
          if [ -z "$AZURE_BACKEND_PUBLISH_PROFILE" ]; then
            echo "AZURE_BACKEND_PUBLISH_PROFILE is empty or not found."
            echo "Please check GitHub repository secrets."
            exit 1
          fi
          echo "AZURE_BACKEND_PUBLISH_PROFILE is available."

      - name: Deploy backend to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.BACKEND_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_BACKEND_PUBLISH_PROFILE }}
          package: backend

      - name: Wait for backend to start
        run: sleep 60

      - name: Health check backend
        run: |
          for i in {1..10}; do
            RESPONSE=$(curl -L -s -o /dev/null -w "%{http_code}" "${{ env.BACKEND_URL }}/" || echo "000")
            echo "Percobaan $i - Backend HTTP status: $RESPONSE"

            if [ "$RESPONSE" = "200" ]; then
              echo "Backend berhasil berjalan."
              exit 0
            fi

            echo "Backend belum siap, tunggu 15 detik..."
            sleep 15
          done

          echo "Backend health check gagal."
          exit 1

  frontend-cd:
    name: Frontend CD - Deploy to Azure Web App
    runs-on: ubuntu-latest
    needs: frontend-ci

    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-artifact
          path: frontend-dist

      - name: Check frontend publish profile secret
        env:
          AZURE_FRONTEND_PUBLISH_PROFILE: ${{ secrets.AZURE_FRONTEND_PUBLISH_PROFILE }}
        run: |
          if [ -z "$AZURE_FRONTEND_PUBLISH_PROFILE" ]; then
            echo "AZURE_FRONTEND_PUBLISH_PROFILE is empty or not found."
            echo "Please check GitHub repository secrets."
            exit 1
          fi
          echo "AZURE_FRONTEND_PUBLISH_PROFILE is available."

      - name: Deploy frontend to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.FRONTEND_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_FRONTEND_PUBLISH_PROFILE }}
          package: frontend-dist

      - name: Wait for frontend to start
        run: sleep 60

      - name: Health check frontend
        run: |
          for i in {1..10}; do
            RESPONSE=$(curl -L -s -o /dev/null -w "%{http_code}" "${{ env.FRONTEND_URL }}/" || echo "000")
            echo "Percobaan $i - Frontend HTTP status: $RESPONSE"

            if [ "$RESPONSE" = "200" ]; then
              echo "Frontend berhasil berjalan."
              exit 0
            fi

            echo "Frontend belum siap, tunggu 15 detik..."
            sleep 15
          done

          echo "Frontend health check gagal."
          exit 1