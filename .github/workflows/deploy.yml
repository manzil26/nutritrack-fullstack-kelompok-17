name: NutriTrack CI/CD Pipeline - Kelompok 17

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  NODE_VERSION: '20'
  BACKEND_APP_NAME: 'nutritrack-backend-klp17'
  FRONTEND_APP_NAME: 'nutritrack-frontend-klp17'
  BACKEND_URL: 'https://nutritrack-backend-klp17.azurewebsites.net'
  FRONTEND_URL: 'https://nutritrack-frontend-klp17.azurewebsites.net'

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Run backend ESLint if config exists
        run: |
          if [ -f ".eslintrc.js" ] || [ -f ".eslintrc.json" ] || [ -f "eslint.config.js" ]; then
            npx eslint . --ext .js --ignore-pattern node_modules/
          else
            echo "ESLint config backend belum ada, lint backend dilewati."
          fi

      - name: Run backend tests if test files exist
        run: |
          if find . -name "*.test.js" -not -path "*/node_modules/*" | grep -q .; then
            npx jest --forceExit --detectOpenHandles --coverage
          else
            echo "File test backend belum ada, test backend dilewati."
          fi
        env:
          NODE_ENV: test
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Security scan backend
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Upload backend artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: |
            backend/
            !backend/node_modules/
            !backend/.env
          retention-days: 1

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend ESLint
        run: npm run lint

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Upload frontend artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 1

  backend-cd:
    name: Backend CD - Deploy to Azure App Service
    runs-on: ubuntu-latest
    needs: backend-ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-build
          path: backend/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install backend production dependencies
        run: npm ci --omit=dev
        working-directory: ./backend

      - name: Deploy backend to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.BACKEND_APP_NAME }}
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_BACKEND }}
          package: ./backend

      - name: Wait for backend to start
        run: sleep 45

      - name: Health check backend
        run: |
          for i in {1..10}; do
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" ${{ env.BACKEND_URL }}/)
            echo "Percobaan $i - Backend HTTP status: $RESPONSE"

            if [ "$RESPONSE" = "200" ]; then
              echo "Backend berhasil berjalan."
              exit 0
            fi

            echo "Backend belum siap, tunggu 15 detik..."
            sleep 15
          done

          echo "Backend health check gagal."
          exit 1

  frontend-cd:
    name: Frontend CD - Deploy to Azure Web App
    runs-on: ubuntu-latest
    needs: frontend-ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: dist/

      - name: Deploy frontend to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.FRONTEND_APP_NAME }}
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_FRONTEND }}
          package: ./dist

      - name: Wait for frontend to start
        run: sleep 45

      - name: Health check frontend
        run: |
          for i in {1..10}; do
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" ${{ env.FRONTEND_URL }}/)
            echo "Percobaan $i - Frontend HTTP status: $RESPONSE"

            if [ "$RESPONSE" = "200" ]; then
              echo "Frontend berhasil berjalan."
              exit 0
            fi

            echo "Frontend belum siap, tunggu 15 detik..."
            sleep 15
          done

          echo "Frontend health check gagal."
          exit 1